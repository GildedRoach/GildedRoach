name: GitHub Metrics
permissions:
   contents: write
on:
  schedule:
    - cron: "0 0 * * *"
  push:
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Update GitHub Metrics
        uses: GildedRoach/metrics@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: America/Chicago
          retries: 3
          retries_delay: 300
          config_display: large
          config_output: svg
          plugin_activity: yes
          plugin_activity_filter: issue, pr, release, review, wiki, star
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_repositories: yes
          plugin_repositories_featured: terrapkg/packages
          plugin_repositories_affiliations: ""
          plugin_licenses: yes
          plugin_notable: yes
          plugin_isocalendar: yes
          filename: profile/github-metrics.svg

      - name: Update code lines
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: America/Chicago
          retries: 3
          retries_delay: 300
          config_display: large
          config_output: svg
          base: repositories, metadata
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugins_errors_fatal: yes
          filename: profile/lines.svg

      - name: Update coding habits
        uses: GildedRoach/metrics@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: America/Chicago
          retries: 3
          retries_delay: 300
          config_display: large
          config_output: svg
          base: respositories, metadata
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugins_errors_fatal: yes
          filename: profile/coding-habits.svg

      - name: Update starred repositories
        uses: GildedRoach/metrics@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: America/Chicago
          retries: 3
          retries_delay: 300
          config_display: large
          config_output: svg
          base: respositories
          plugin_starlists: yes
          plugin_starlists_languages: yes
          plugin_stars: yes
          plugin_activity: yes
          plugin_activity_filter: star
          plugins_errors_fatal: yes
          filename: profile/starred-repositories.svg

      - name: Update most used languages
        uses: GildedRoach/metrics@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: America/Chicago
          retries: 3
          retries_delay: 300
          config_display: large
          config_output: svg
          base: respositories, metadata
          plugin_languages: yes
          plugin_languages_details: bytes-size, lines, percentage
          plugin_languages_limit: 6
          plugin_languages_colors: rainbow
          plugins_errors_fatal: yes
          filename: profile/languages.svg
